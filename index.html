<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Receipt Splitter & UPI Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💳 Real-Time Receipt Splitter & UPI Generator</h1>
        <p class="subtitle">Split bills instantly and generate UPI payment links.</p>

        <div class="main-layout">
            <!-- Left Card: Receipt Details -->
            <div class="card">
                <h2>Receipt Details</h2>
                <div class="form-group">
                    <label>Total Bill Amount (₹)</label>
                    <input type="number" id="totalAmount" placeholder="Enter total bill">
                </div>
                <div class="form-group">
                    <label>Number of People</label>
                    <input type="number" id="peopleCount" placeholder="Enter number of people">
                </div>
                <button id="splitBtn">Split Bill</button>
                <h3 id="result" style="margin-top: 15px; color: #2e7d32;"></h3>
            </div>

            <!-- Right Card: UPI Generator -->
            <div class="card">
                <h2>UPI Generator</h2>
                <div class="form-group">
                    <label>UPI ID</label>
                    <input type="text" id="upiId" placeholder="example@upi">
                </div>
                <button id="generateUpiBtn">Generate UPI Link & QR</button>
                
                <!-- This is where the QR Code will show up -->
                <div id="qrcode-container" style="margin-top: 20px; display: flex; justify-content: center;"></div>
                
                <textarea id="upiResult" readonly style="margin-top: 15px; width: 100%; height: 60px; display: none;"></textarea>
            </div>
        </div>
    </div>

    <!-- This script loads the QR Code library from the internet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
